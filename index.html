<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢密碼破解器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .japanese-font {
            font-family: 'Yusei Magic', sans-serif;
        }
        .card-pop {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }
        .card-pop:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-anim {
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-slate-700">
        
        <div class="bg-red-600 text-white p-4 flex justify-between items-center border-b-4 border-slate-700 relative">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider">寶可夢學習終端機</h1>
            <div id="level-indicator" class="bg-white text-red-600 px-3 py-1 rounded-full font-bold text-sm hidden">
                準備中
            </div>
            <button id="home-btn" class="bg-white text-slate-800 px-3 py-1 rounded-full font-bold text-sm hidden hover:bg-slate-200">
                回主畫面
            </button>
        </div>

        <div class="p-6 bg-slate-50 border-b-2 border-slate-200">
            <div class="flex items-start gap-4">
                <div class="text-4xl">👨‍🏫</div>
                <div class="flex-1 flex flex-col gap-2">
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200 relative">
                        <p id="dialogue-text" class="text-lg md:text-xl text-slate-800 leading-relaxed">
                            歡迎回到訓練中心！題庫已經更新，今天你想挑戰哪一種特訓呢？
                        </p>
                    </div>
                    
                    <div id="hint-container" class="hidden">
                        <button id="hint-btn" class="text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold py-1.5 px-3 rounded-full border border-yellow-300 transition-colors flex items-center gap-1">
                            點我看圖鑑提示
                        </button>
                        <div id="hint-text-box" class="hidden mt-2 bg-yellow-50 border border-yellow-200 text-yellow-800 p-3 rounded-xl text-sm md:text-base leading-relaxed">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="interactive-area" class="p-6 text-center min-h-[300px] flex flex-col justify-center items-center">
            
            <div id="mode-selection" class="flex flex-col md:flex-row gap-6 w-full max-w-md">
                <button onclick="selectMode('name')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-6 px-4 rounded-2xl card-pop border-b-4 border-blue-700">
                    <div class="text-3xl mb-2">🔍</div>
                    名字解碼專家<br>
                    <span class="text-sm font-normal text-blue-100">訓練片假名</span>
                </button>
                <button onclick="selectMode('type')" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-6 px-4 rounded-2xl card-pop border-b-4 border-green-700">
                    <div class="text-3xl mb-2">🔥</div>
                    屬性研究員<br>
                    <span class="text-sm font-normal text-green-100">訓練平假名</span>
                </button>
            </div>
            
            <div id="options-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full hidden">
            </div>

            <div id="result-area" class="hidden flex flex-col items-center w-full">
                <div id="type-badge" class="hidden text-3xl font-bold text-white px-6 py-2 rounded-full mb-4 correct-anim"></div>
                
                <img id="pokemon-image" src="" alt="寶可夢" class="w-48 h-48 object-contain drop-shadow-lg mb-4">
                <div class="flex flex-wrap justify-center gap-2 mb-4" id="collected-letters">
                </div>
                <button id="next-btn" class="mt-4 bg-slate-700 hover:bg-slate-800 text-white text-lg font-bold py-3 px-6 rounded-full card-pop border-b-4 border-slate-900 hidden">
                    下一個字
                </button>
                <button id="next-level-btn" class="mt-4 bg-purple-500 hover:bg-purple-600 text-white text-lg font-bold py-3 px-6 rounded-full card-pop border-b-4 border-purple-700 hidden">
                    下一關！
                </button>
            </div>
        </div>

    </div>

    <script>
        // 名字模式擴充：直接從使用者提供的五十音表上選角
        const nameLevels = [
            {
                pokemonName: "路卡利歐", pokemonId: 448, 
                steps: [
                    { dialogue: "先來暖個身！找出路卡利歐的第一個字「Ru」！", target: "ル", romanji: "Ru", options: ["ア", "ル", "サ", "メ"], hint: "左邊數來第二行，神獸洛奇亞格子右下角的片假名。" },
                    { dialogue: "第二個字是「Ka」，找找看！", target: "カ", romanji: "Ka", options: ["ナ", "オ", "カ", "キ"], hint: "第一排右邊數來第二個，水箭龜格子右下角的字。" },
                    { dialogue: "第三個字是「Ri」！", target: "リ", romanji: "Ri", options: ["リ", "ソ", "ン", "ツ"], hint: "左邊數來第二行，噴火龍格子右下角。" },
                    { dialogue: "最後一個字！發音是「O」！", target: "オ", romanji: "O", options: ["木", "オ", "ネ", "ホ"], hint: "最右下角，火爆猴旁邊方方的字！" }
                ],
                bonusDialogue: "漂亮！路卡利歐的名字你已經很熟練了。"
            },
            {
                pokemonName: "拉普拉斯", pokemonId: 131, 
                steps: [
                    { dialogue: "新挑戰！乘龍(拉普拉斯)就在你的實體表上！發音是 Ra-Pu-Ra-Su。先找「Ra」！", target: "ラ", romanji: "Ra", options: ["ラ", "ウ", "ス", "ヤ"], hint: "超簡單，直接看最上面那一排左邊數來第三個，拉普拉斯自己格子右下角的字！" },
                    { dialogue: "第二個字是「Pu」。要找加小圈圈的魔法喔！", target: "プ", romanji: "Pu", options: ["ブ", "プ", "フ", "パ"], hint: "先找到妙蛙種子(第三排中間)，把牠格子右下角的字加上小圈圈！" },
                    { dialogue: "第三個字又是「Ra」，這題送分！", target: "ラ", romanji: "Ra", options: ["マ", "ラ", "ケ", "ナ"], hint: "跟第一個字一模一樣喔。" },
                    { dialogue: "最後一個字是「Su」！", target: "ス", romanji: "Su", options: ["ヌ", "ス", "マ", "ム"], hint: "找找右邊數來第四行，神獸水君(藍色的)，牠格子右下角的字。" }
                ],
                bonusDialogue: "太棒了！拉普拉斯(乘龍)解碼成功！"
            },
            {
                pokemonName: "呆呆獸", pokemonId: 79, 
                steps: [
                    { dialogue: "這隻也印在你的表上喔！呆呆獸發音是 Ya-Do-N。先找「Ya」！", target: "ヤ", romanji: "Ya", options: ["ヤ", "セ", "マ", "ラ"], hint: "看最上面那一排，左邊數來第四個，呆呆獸自己格子右下角的字！" },
                    { dialogue: "第二個字是「Do」，這是一個濁音(加兩點)。", target: "ド", romanji: "Do", options: ["ト", "ド", "デ", "ダ"], hint: "找實體表下半部中間，還在蛋殼裡的波克比，把那格的字加上兩點。" },
                    { dialogue: "最後是閉嘴巴的鼻音「N」，我們的老朋友了。", target: "ン", romanji: "N", options: ["ソ", "シ", "ン", "ツ"], hint: "最左上角，卡比獸格子裡的那個字！" }
                ],
                bonusDialogue: "解碼成功！呆呆獸(ヤドン)的名字是不是很可愛？"
            },
            {
                pokemonName: "閃電鳥", pokemonId: 145, 
                steps: [
                    { dialogue: "傳說中的神獸閃電鳥！發音是 Sa-N-Da-A(長音)。先找「Sa」！", target: "サ", romanji: "Sa", options: ["サ", "キ", "マ", "ヤ"], hint: "看最上面那一排右邊數來第三個，閃電鳥自己格子右下角的字！" },
                    { dialogue: "第二個又是鼻音「N」！", target: "ン", romanji: "N", options: ["ン", "シ", "ソ", "ツ"], hint: "卡比獸的格子！你一定閉著眼睛都能找到了。" },
                    { dialogue: "第三個字是「Da」，也是加兩點的濁音。", target: "ダ", romanji: "Da", options: ["タ", "ダ", "デ", "ド"], hint: "找右上角藍色的海馬(墨海馬)，把那格的字加上兩點。" },
                    { dialogue: "最後一個是把聲音拉長的「長音符號」！", target: "ー", romanji: "(長音)", options: ["一", "ー", "ニ", "ン"], hint: "找最像一條橫線的那個符號就對了。" }
                ],
                bonusDialogue: "神獸解碼完成！你連閃電鳥的名字都看得懂了，真的是解碼專家！"
            }
        ];

        // 屬性模式擴充：加入冰、蟲、毒
        const typeLevels = [
            {
                pokemonName: "小火龍", pokemonId: 4, typeName: "火屬性", typeColor: "bg-red-500",
                steps: [
                    { dialogue: "屬性特訓開始！找出火(Ho-No-O)。屬性要看實體表上大大的『平假名』！先找 Ho。", target: "ほ", romanji: "Ho", options: ["ほ", "は", "ま", "よ"], hint: "看實體表最後一排中間的多邊獸，大大的黑字就是 Ho。" },
                    { dialogue: "第二個字是 No。", target: "の", romanji: "No", options: ["め", "ぬ", "の", "あ"], hint: "找最後一排的土龍弟弟，牠身上大大的字就是 No。" },
                    { dialogue: "最後一個字是 O。", target: "お", romanji: "O", options: ["あ", "お", "む", "を"], hint: "最右下角的火爆猴，看大大的黑字喔！" }
                ],
                bonusDialogue: "解鎖火屬性「ほのお」！在日文裡就是火焰的意思。"
            },
            {
                pokemonName: "急凍鳥", pokemonId: 144, typeName: "冰屬性", typeColor: "bg-cyan-400 text-slate-800",
                steps: [
                    { dialogue: "急凍鳥是冰屬性(Ko-O-Ri)！這個單字超實用。先找 Ko。", target: "こ", romanji: "Ko", options: ["こ", "い", "に", "た"], hint: "找最下面那一排，黃色的可達鴨，看牠格子裡的大字。" },
                    { dialogue: "第二個字是 O，火屬性那關才剛找過喔！", target: "お", romanji: "O", options: ["あ", "お", "む", "を"], hint: "最右下角火爆猴格子裡的大字。" },
                    { dialogue: "最後一個字是 Ri，長得像兩根棍子。", target: "り", romanji: "Ri", options: ["り", "い", "に", "ち"], hint: "找左邊數來第二行的噴火龍，看大大的黑字。" }
                ],
                bonusDialogue: "解鎖冰屬性「こおり」！去日本吃刨冰或是點飲料要加冰塊，就是這個字喔！"
            },
            {
                pokemonName: "綠毛蟲", pokemonId: 10, typeName: "蟲屬性", typeColor: "bg-lime-500 text-slate-800",
                steps: [
                    { dialogue: "綠毛蟲是蟲屬性(Mu-Shi)！只有兩個字，很簡單。先找 Mu。", target: "む", romanji: "Mu", options: ["す", "む", "め", "も"], hint: "找第三排，有一隻紫色頭髮的夢妖，看牠格子裡的大字。" },
                    { dialogue: "第二個字是 Shi，長得像一個大大的鉤子。", target: "し", romanji: "Shi", options: ["し", "つ", "て", "ひ"], hint: "找第二排右邊數來第三個，白色的基拉祈，看大大的黑字。" }
                ],
                bonusDialogue: "解鎖蟲屬性「むし」！夏天去公園抓獨角仙，就是去抓 Mu-Shi 喔！"
            },
            {
                pokemonName: "阿柏蛇", pokemonId: 23, typeName: "毒屬性", typeColor: "bg-purple-600",
                steps: [
                    { dialogue: "阿柏蛇是毒屬性(Do-Ku)！第一個字是 Do，這是 To 加上兩點的濁音喔。", target: "ど", romanji: "Do", options: ["と", "ど", "で", "て"], hint: "找實體表下半部中間的波克比，把那格的大字加上兩點。" },
                    { dialogue: "第二個字是 Ku，長得像小於符號 <。", target: "く", romanji: "Ku", options: ["く", "へ", "て", "し"], hint: "找右邊數來第二行，頭上有一朵大花的臭臭花，看裡面的大字。" }
                ],
                bonusDialogue: "解鎖毒屬性「どく」！平常看到這個字要小心喔！"
            },
            {
                pokemonName: "比雕", pokemonId: 18, typeName: "飛行屬性", typeColor: "bg-sky-300 text-slate-800",
                steps: [
                    { dialogue: "比雕(大比鳥)是飛行屬性(Hi-Ko-U)！先找第一個字 Hi。", target: "ひ", romanji: "Hi", options: ["ひ", "い", "に", "き"], hint: "找第二排中間的小火龍，看大大的黑字！" },
                    { dialogue: "第二個字是 Ko，冰屬性那關找過囉。", target: "こ", romanji: "Ko", options: ["こ", "い", "に", "た"], hint: "最下面一排黃色的可達鴨。" },
                    { dialogue: "最後一個字是 U，皮卡丘那關也有用到。", target: "う", romanji: "U", options: ["う", "つ", "て", "ろ"], hint: "找右邊數來第三排最上面的風速狗，看大字！" }
                ],
                bonusDialogue: "解鎖飛行屬性「ひこう」！你現在認識超多屬性的日文了，太強啦！"
            }
        ];

        let currentLevels = [];
        let currentLevelIndex = 0;
        let currentStepIndex = -1;
        let collectedLetters = [];
        let currentMode = '';

        const dialogueText = document.getElementById('dialogue-text');
        const modeSelection = document.getElementById('mode-selection');
        const interactiveArea = document.getElementById('interactive-area');
        const optionsGrid = document.getElementById('options-grid');
        const resultArea = document.getElementById('result-area');
        const pokemonImage = document.getElementById('pokemon-image');
        const collectedLettersContainer = document.getElementById('collected-letters');
        const nextBtn = document.getElementById('next-btn');
        const nextLevelBtn = document.getElementById('next-level-btn');
        const hintContainer = document.getElementById('hint-container');
        const hintBtn = document.getElementById('hint-btn');
        const hintTextBox = document.getElementById('hint-text-box');
        const levelIndicator = document.getElementById('level-indicator');
        const homeBtn = document.getElementById('home-btn');
        const typeBadge = document.getElementById('type-badge');

        function speak(text) {
            if ('speechSynthesis' in window) {
                if (text === 'ー') {
                    const utterance = new SpeechSynthesisUtterance('長音');
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.8; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        hintBtn.addEventListener('click', () => {
            const currentLevel = currentLevels[currentLevelIndex];
            if (currentStepIndex >= 0 && currentStepIndex < currentLevel.steps.length) {
                hintTextBox.textContent = currentLevel.steps[currentStepIndex].hint;
                hintTextBox.classList.remove('hidden');
            }
        });

        homeBtn.addEventListener('click', () => {
            resetToHome();
        });

        function resetToHome() {
            modeSelection.classList.remove('hidden');
            optionsGrid.classList.add('hidden');
            resultArea.classList.add('hidden');
            levelIndicator.classList.add('hidden');
            homeBtn.classList.add('hidden');
            hintContainer.classList.add('hidden');
            dialogueText.textContent = "歡迎回到訓練中心！題庫已經更新，今天你想挑戰哪一種特訓呢？";
        }

        function selectMode(mode) {
            currentMode = mode;
            currentLevels = mode === 'name' ? nameLevels : typeLevels;
            currentLevelIndex = 0;
            
            modeSelection.classList.add('hidden');
            levelIndicator.classList.remove('hidden');
            homeBtn.classList.remove('hidden');
            
            startLevel();
        }

        function startLevel() {
            currentStepIndex = -1;
            collectedLetters = [];
            collectedLettersContainer.innerHTML = '';
            
            let modeTitle = currentMode === 'name' ? '名字關卡' : '屬性關卡';
            levelIndicator.textContent = `${modeTitle} ${currentLevelIndex + 1}/${currentLevels.length}`;
            
            optionsGrid.classList.remove('hidden');
            resultArea.classList.remove('hidden');
            nextLevelBtn.classList.add('hidden');
            typeBadge.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            pokemonImage.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentLevel.pokemonId}.png`; 
            
            if (currentMode === 'type') {
                pokemonImage.classList.remove('brightness-0', 'opacity-50');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100');
            } else {
                pokemonImage.classList.add('brightness-0', 'opacity-50', 'w-32', 'h-32'); 
                pokemonImage.classList.remove('w-48', 'h-48', 'brightness-100', 'opacity-100');
            }
            
            nextStep();
        }

        function nextStep() {
            currentStepIndex++;
            nextBtn.classList.add('hidden');
            optionsGrid.innerHTML = '';
            
            hintContainer.classList.remove('hidden');
            hintTextBox.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];

            if (currentStepIndex < currentLevel.steps.length) {
                const step = currentLevel.steps[currentStepIndex];
                dialogueText.innerHTML = `${step.dialogue} <button onclick="speak('${step.target}')" class="ml-2 bg-yellow-100 border border-yellow-400 text-yellow-700 text-sm px-2 py-1 rounded-full hover:bg-yellow-200">🔊 聽發音</button>`;
                
                const shuffledOptions = shuffleArray([...step.options]);
                
                shuffledOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'japanese-font text-5xl md:text-6xl text-slate-700 bg-white border-4 border-slate-200 rounded-2xl p-6 flex items-center justify-center card-pop hover:border-blue-400 hover:text-blue-600 transition-colors aspect-square';
                    btn.textContent = option;
                    
                    btn.addEventListener('click', () => handleOptionClick(btn, option, step.target, step.romanji));
                    optionsGrid.appendChild(btn);
                });
            } else {
                showBonus();
            }
        }

        function handleOptionClick(btn, selected, target, romanji) {
            speak(selected); 
            
            if (selected === target) {
                btn.classList.remove('border-slate-200', 'text-slate-700', 'hover:border-blue-400');
                btn.classList.add('border-green-500', 'text-green-600', 'bg-green-50', 'correct-anim');
                
                const allBtns = optionsGrid.querySelectorAll('button');
                allBtns.forEach(b => b.disabled = true);
                
                collectedLetters.push({ char: target, romaji: romanji });
                updateCollectedArea();
                
                dialogueText.textContent = `叮咚叮咚！就是這個字！`;
                hintContainer.classList.add('hidden'); 
                
                setTimeout(() => {
                    nextBtn.classList.remove('hidden');
                }, 800);

            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                setTimeout(() => {
                    btn.classList.remove('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                }, 500);
            }
        }

        function updateCollectedArea() {
            collectedLettersContainer.innerHTML = '';
            collectedLetters.forEach(item => {
                const box = document.createElement('div');
                box.className = 'bg-slate-800 text-white border-2 border-slate-600 rounded-lg p-3 text-center min-w-[4rem] correct-anim';
                
                box.innerHTML = `
                    <div class="japanese-font text-3xl font-bold">${item.char}</div>
                    <div class="text-xs text-slate-300 mt-1">${item.romaji}</div>
                `;
                collectedLettersContainer.appendChild(box);
            });
        }

        function showBonus() {
            optionsGrid.classList.add('hidden');
            hintContainer.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            
            if (currentMode === 'name') {
                pokemonImage.classList.remove('brightness-0', 'opacity-50', 'w-32', 'h-32');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100', 'correct-anim');
            } else if (currentMode === 'type') {
                typeBadge.textContent = currentLevel.typeName;
                typeBadge.className = `text-2xl md:text-3xl font-bold px-6 py-2 rounded-full mb-4 correct-anim shadow-md ${currentLevel.typeColor}`;
                typeBadge.classList.remove('hidden');
            }
            
            let fullName = currentLevel.steps.map(s => s.target).join('');
            speak(fullName); 

            dialogueText.innerHTML = currentLevel.bonusDialogue;
            
            setTimeout(() => {
                if (currentLevelIndex < currentLevels.length - 1) {
                    nextLevelBtn.classList.remove('hidden');
                } else {
                    let finalMessage = document.createElement('div');
                    finalMessage.className = "mt-6 p-4 bg-yellow-100 border-2 border-yellow-400 rounded-xl text-yellow-800 font-bold text-lg correct-anim text-center w-full max-w-sm";
                    finalMessage.innerHTML = "🏆 特訓完成！你現在越來越強了！<br><span class='text-sm font-normal mt-2 block'>點擊右上角回主畫面選擇其他特訓</span>";
                    resultArea.appendChild(finalMessage);
                }
            }, 1000);
        }

        nextBtn.addEventListener('click', nextStep);
        
        nextLevelBtn.addEventListener('click', () => {
            currentLevelIndex++;
            startLevel();
        });

    </script>
</body>
</html>
