<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢學習終端機 - 完整五十音特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .japanese-font {
            font-family: 'Yusei Magic', sans-serif;
        }
        .card-pop {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }
        .card-pop:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-anim {
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .hint-slide-down {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 懸浮查表按鈕 -->
    <button id="chart-btn" class="fixed bottom-6 right-6 bg-yellow-400 hover:bg-yellow-500 text-slate-800 font-bold py-3 px-5 rounded-full shadow-xl border-2 border-yellow-600 transition-transform transform hover:scale-105 z-40 flex items-center gap-2">
        🗺️ 寶可夢五十音表
    </button>

    <!-- 五十音表彈出視窗 -->
    <div id="chart-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="relative w-full max-w-6xl flex flex-col items-center">
            <button id="close-chart-btn" class="absolute -top-12 right-0 md:-right-12 bg-red-500 hover:bg-red-600 text-white font-bold w-10 h-10 rounded-full text-xl flex items-center justify-center border-2 border-white shadow-lg transition-transform hover:scale-110">
                ✕
            </button>
            <img src="chart.jpg" alt="寶可夢五十音表" class="w-full h-auto max-h-[85vh] object-contain rounded-xl shadow-2xl border-4 border-white bg-white">
            <p class="text-white mt-3 text-sm tracking-wide bg-black/50 px-4 py-1 rounded-full">※ 如果圖片沒有顯示，請確認圖片檔名是否為 chart.jpg 且與網頁放在同一個資料夾</p>
        </div>
    </div>

    <div id="game-container" class="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-slate-700 relative z-10">
        
        <div class="bg-red-600 text-white p-4 flex justify-between items-center border-b-4 border-slate-700 relative">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider">五十音大師訓練中心</h1>
            <div id="level-indicator" class="bg-white text-red-600 px-3 py-1 rounded-full font-bold text-sm hidden">
                準備中
            </div>
            <button id="home-btn" class="bg-white text-slate-800 px-3 py-1 rounded-full font-bold text-sm hidden hover:bg-slate-200 transition-colors">
                回主畫面
            </button>
        </div>

        <div class="p-6 bg-slate-50 border-b-2 border-slate-200">
            <div class="flex items-start gap-4">
                <div class="text-4xl">👨‍🏫</div>
                <div class="flex-1 flex flex-col gap-2">
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200 relative">
                        <p id="dialogue-text" class="text-lg md:text-xl text-slate-800 leading-relaxed">
                            歡迎來到究極特訓！這裡有六大主題，只要全部通關，你就能看懂圖鑑上 90% 的日文了！今天想先挑戰哪個？
                        </p>
                    </div>
                    
                    <div id="hint-container" class="hidden">
                        <button id="hint-btn" class="text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold py-1.5 px-3 rounded-full border border-yellow-300 transition-colors flex items-center gap-1">
                            💡 不知道在哪裡？點我看提示
                        </button>
                        <div id="hint-text-box" class="hidden mt-2 bg-yellow-50 border border-yellow-200 text-yellow-800 p-3 rounded-xl text-sm md:text-base leading-relaxed">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="interactive-area" class="p-6 text-center min-h-[400px] flex flex-col justify-center items-center">
            
            <!-- 六大模式選單 -->
            <div id="mode-selection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full">
                <!-- 名字特訓區 -->
                <button onclick="selectMode('basicName')" class="bg-blue-500 hover:bg-blue-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-blue-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🔍</div>
                    基礎圖鑑解碼
                    <span class="text-sm font-normal text-blue-100 mt-1">10隻經典寶可夢</span>
                </button>
                <button onclick="selectMode('advName1')" class="bg-indigo-500 hover:bg-indigo-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-indigo-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">✨</div>
                    進階圖鑑解碼 (上)
                    <span class="text-sm font-normal text-indigo-100 mt-1">拉普拉斯/呆呆獸/阿柏蛇</span>
                </button>
                <button onclick="selectMode('advName2')" class="bg-violet-500 hover:bg-violet-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-violet-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🌟</div>
                    進階圖鑑解碼 (下)
                    <span class="text-sm font-normal text-violet-100 mt-1">傑尼龜/鳳王/瑪力露</span>
                </button>

                <!-- 屬性與指令區 -->
                <button onclick="selectMode('basicType')" class="bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-green-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🌱</div>
                    基礎屬性特訓
                    <span class="text-sm font-normal text-green-100 mt-1">火 / 水 / 草 / 電</span>
                </button>
                <button onclick="selectMode('advType')" class="bg-teal-500 hover:bg-teal-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-teal-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">❄️</div>
                    進階屬性特訓
                    <span class="text-sm font-normal text-teal-100 mt-1">冰蟲毒飛 / 岩地鋼惡</span>
                </button>
                <button onclick="selectMode('command')" class="bg-orange-500 hover:bg-orange-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-orange-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🎮</div>
                    對戰指令中心
                    <span class="text-sm font-normal text-orange-100 mt-1">戰鬥 / 逃跑 / 道具 / 進化</span>
                </button>
            </div>
            
            <!-- 選項網格 -->
            <div id="options-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full hidden">
            </div>

            <!-- 結果展示區 -->
            <div id="result-area" class="hidden flex flex-col items-center w-full">
                <!-- 用來顯示屬性或指令的中文意思 -->
                <div id="badge-display" class="hidden text-2xl md:text-3xl font-bold text-white px-6 py-2 rounded-full mb-4 correct-anim shadow-md"></div>
                
                <img id="pokemon-image" src="" alt="圖片" class="w-48 h-48 object-contain drop-shadow-lg mb-4">
                <div class="flex flex-wrap justify-center gap-2 mb-2" id="collected-letters">
                </div>
                
                <!-- 再聽一次發音按鈕 -->
                <button id="replay-audio-btn" class="hidden mb-4 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold py-2 px-6 rounded-full border border-yellow-300 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    🔊 再聽一次完整發音
                </button>

                <button id="next-btn" class="mt-2 bg-slate-700 hover:bg-slate-800 text-white text-lg font-bold py-3 px-8 rounded-full card-pop border-b-4 border-slate-900 hidden">
                    尋找下一個字
                </button>
                <button id="next-level-btn" class="mt-2 bg-purple-500 hover:bg-purple-600 text-white text-lg font-bold py-3 px-8 rounded-full card-pop border-b-4 border-purple-700 hidden">
                    前往下一關！
                </button>
            </div>
        </div>

    </div>

    <script>
        // === 五十音表彈窗邏輯 ===
        const chartBtn = document.getElementById('chart-btn');
        const chartModal = document.getElementById('chart-modal');
        const closeChartBtn = document.getElementById('close-chart-btn');

        chartBtn.addEventListener('click', () => {
            chartModal.classList.remove('hidden');
        });

        closeChartBtn.addEventListener('click', () => {
            chartModal.classList.add('hidden');
        });

        // 點擊圖片以外的黑色半透明背景也能關閉
        chartModal.addEventListener('click', (e) => {
            if (e.target === chartModal) {
                chartModal.classList.add('hidden');
            }
        });


        // === 1. 基礎圖鑑解碼 (10關) ===
        const basicNameLevels = [
            { pokemonName: "路卡利歐", pokemonId: 448, 
              steps: [
                  { dialogue: "第一關！路卡利歐。請找出發音是「Ru」的字！", target: "ル", romanji: "Ru", options: ["ア", "ル", "サ", "メ"], hint: "打開五十音表找找看，左邊數來第二行，神獸洛奇亞格子右下角的字。" },
                  { dialogue: "太厲害了！接下來第二個字發音是「Ka」，找找看！", target: "カ", romanji: "Ka", options: ["ナ", "オ", "カ", "キ"], hint: "第一排右邊數來第二個，水箭龜格子右下角。" },
                  { dialogue: "找到了！第三個字發音是「Ri」，交給你了！", target: "リ", romanji: "Ri", options: ["リ", "ソ", "ン", "ツ"], hint: "左邊數來第二行，噴火龍格子右下角。" },
                  { dialogue: "路卡利歐的最後一個字！發音是「O」！", target: "オ", romanji: "O", options: ["木", "オ", "ネ", "ホ"], hint: "看實體表的最右下角，火爆猴旁邊的字！" }
              ], bonusDialogue: "太強了！你成功拼出了「ルカリオ」。" },
            { pokemonName: "卡比獸", pokemonId: 143, 
              steps: [
                  { dialogue: "第二關是愛睡覺的卡比獸！發音是 Ka-Bi-Go-N。第一個字是學過的「Ka」。", target: "カ", romanji: "Ka", options: ["カ", "ウ", "ミ", "ラ"], hint: "再看一次第一排的「水箭龜」喔！" },
                  { dialogue: "第二個字是「Bi」。在「Hi」這個字的右上角加上兩點就是了。", target: "ビ", romanji: "Bi", options: ["ピ", "ビ", "ヒ", "ニ"], hint: "找小火龍(第二排中間)，把牠旁邊的字加上兩點。" },
                  { dialogue: "第三個字是「Go」。找到「Ko」加上兩點！", target: "ゴ", romanji: "Go", options: ["コ", "ド", "ゴ", "ボ"], hint: "最下面那一排可達鴨，把字加上兩點！" },
                  { dialogue: "最後是閉著嘴巴發出的鼻音「N」！", target: "ン", romanji: "N", options: ["ソ", "シ", "ン", "ツ"], hint: "整張表最左上角，卡比獸自己的格子裡！" }
              ], bonusDialogue: "漂亮！你成功收服了卡比獸！也學會了加兩點的濁音。" },
            { pokemonName: "皮卡丘", pokemonId: 25, 
              steps: [
                  { dialogue: "第三關！皮卡丘！發音是 Pi-Ka-Chu-U。第一個字「Pi」，在「Hi」加上一個小圈圈！", target: "ピ", romanji: "Pi", options: ["ビ", "ピ", "ヒ", "パ"], hint: "看小火龍，把字加上小圈圈！" },
                  { dialogue: "第二個字是皮卡丘的「Ka」。", target: "カ", romanji: "Ka", options: ["力", "カ", "ク", "ケ"], hint: "水箭龜的格子！" },
                  { dialogue: "「Chu」是把兩個字拼在一起！先找「Chi」。", target: "チ", romanji: "Chi", options: ["テ", "チ", "ナ", "ト"], hint: "第四排右邊數來第二個菊草葉。" },
                  { dialogue: "再來找縮小版的「Yu」！", target: "ュ", romanji: "yu(小字)", options: ["ユ", "ヨ", "ュ", "ョ"], hint: "倒數第二排中間的雪童子。選一個一模一樣但縮小的字！" },
                  { dialogue: "最後一個字是拉長音的「U」！", target: "ウ", romanji: "U", options: ["ワ", "ウ", "ラ", "フ"], hint: "最右邊第三排上面的風速狗格子。" }
              ], bonusDialogue: "太神啦！連最難的「小字組合」（チュ）都學會了！" },
            { pokemonName: "伊布", pokemonId: 133,
              steps: [
                  { dialogue: "第四關伊布！發音是 I-I-Bu-I。第一個字「I」在哪裡？", target: "イ", romanji: "I", options: ["ア", "イ", "ウ", "エ"], hint: "最右邊那一行，上面數下來第二個！" },
                  { dialogue: "第二個是「長音符號」，要把聲音拉長。", target: "ー", romanji: "(長音)", options: ["一", "ー", "ニ", "ン"], hint: "找最像一條橫線的那個。" },
                  { dialogue: "第三個字是「Bu」。找「Fu」加上兩點。", target: "ブ", romanji: "Bu", options: ["プ", "ブ", "フ", "ベ"], hint: "找背著種子的妙蛙種子，把字加兩點！" },
                  { dialogue: "最後一個字也是「I」。", target: "イ", romanji: "I", options: ["イ", "ト", "キ", "メ"], hint: "選跟第一個字一樣的。" }
              ], bonusDialogue: "太棒了！你學會了「長音符號」。" },
            { pokemonName: "耿鬼", pokemonId: 94,
              steps: [
                  { dialogue: "第五關耿鬼！發音是 Ge-N-Ga-A。找找「Ke」加上兩點變成「Ge」！", target: "ゲ", romanji: "Ge", options: ["ケ", "ゲ", "ク", "グ"], hint: "看紫色的耿鬼自己，把字加上兩點。" },
                  { dialogue: "第二個是鼻音「N」！", target: "ン", romanji: "N", options: ["ソ", "ン", "シ", "ツ"], hint: "最左上角的卡比獸格子！" },
                  { dialogue: "第三個字是「Ga」。水箭龜的「Ka」加上兩點！", target: "ガ", romanji: "Ga", options: ["カ", "ガ", "キ", "ギ"], hint: "水箭龜格子裡的字加上兩點！" },
                  { dialogue: "最後又是長音符號！", target: "ー", romanji: "(長音)", options: ["ー", "一", "ソ", "ン"], hint: "那一條橫線。" }
              ], bonusDialogue: "耿鬼的名字裡有兩個濁音，你都順利找出來了！" },
            { pokemonName: "超夢", pokemonId: 150,
              steps: [
                  { dialogue: "第六關超夢！發音是 Myu-U-Tsu-U。第一個字是「Mi」。", target: "ミ", romanji: "Mi", options: ["ミ", "シ", "三", "ン"], hint: "超夢在實體表上也有出現喔！中間偏上的位置。" },
                  { dialogue: "第二個是縮小版的「Yu」。", target: "ュ", romanji: "yu(小字)", options: ["ユ", "ュ", "ヨ", "ョ"], hint: "雪童子格子裡的小字版！" },
                  { dialogue: "第三個是拉長音的「U」！", target: "ウ", romanji: "U", options: ["ウ", "ワ", "ラ", "フ"], hint: "風速狗格子裡的字！" },
                  { dialogue: "第四個字是「Tsu」。", target: "ツ", romanji: "Tsu", options: ["ツ", "シ", "ソ", "ン"], hint: "右邊數來第四行中間綠色殼的壺壺。" },
                  { dialogue: "最後又是長音符號！", target: "ー", romanji: "(長音)", options: ["ー", "一", "ソ", "ン"], hint: "橫線你已經很熟了。" }
              ], bonusDialogue: "超夢這麼複雜的名字都被你破解了！" },
            { pokemonName: "噴火龍", pokemonId: 6,
              steps: [
                  { dialogue: "第七關，噴火龍！發音 Ri-Za-A-Do-N。第一個字「Ri」。", target: "リ", romanji: "Ri", options: ["リ", "ソ", "ン", "ツ"], hint: "實體表上左邊數來第二行橘色的噴火龍身上。" },
                  { dialogue: "第二個字是「Za」。找出「Sa」加上兩點！", target: "ザ", romanji: "Za", options: ["サ", "ザ", "ジ", "ゼ"], hint: "右上角閃電鳥，把格子的字加上兩點。" },
                  { dialogue: "第三個是長音符號！", target: "ー", romanji: "(長音)", options: ["一", "ー", "ニ", "ン"], hint: "那條橫線！" },
                  { dialogue: "第四個字是「Do」。找出「To」加上兩點！", target: "ド", romanji: "Do", options: ["ト", "ド", "デ", "ダ"], hint: "實體表下半部中間的波克比，加上兩點。" },
                  { dialogue: "最後一個音，鼻音「N」！", target: "ン", romanji: "N", options: ["ソ", "シ", "ン", "ツ"], hint: "卡比獸格子裡的字！" }
              ], bonusDialogue: "噴火龍收服成功！" },
            { pokemonName: "甲賀忍蛙", pokemonId: 658,
              steps: [
                  { dialogue: "第八關甲賀忍蛙！發音 Ge-(停頓)-Ko-U-Ga。第一個字「Ge」。", target: "ゲ", romanji: "Ge", options: ["ケ", "ゲ", "ク", "グ"], hint: "耿鬼格子裡的字加上兩點。" },
                  { dialogue: "這是一個新魔法！縮小版的「Tsu」。它不發音，要『停頓一下』喔！", target: "ッ", romanji: "(促音)", options: ["ツ", "ッ", "シ", "ン"], hint: "綠色殼的壺壺，選一個縮小的版本！叫做促音。" },
                  { dialogue: "第三個字是「Ko」。", target: "コ", romanji: "Ko", options: ["ユ", "コ", "ニ", "エ"], hint: "最下面那一排黃色的可達鴨。" },
                  { dialogue: "第四個字是「U」。", target: "ウ", romanji: "U", options: ["ワ", "ウ", "ラ", "フ"], hint: "風速狗格子裡的字！" },
                  { dialogue: "最後一個字是「Ga」。水箭龜的「Ka」加上兩點！", target: "ガ", romanji: "Ga", options: ["カ", "ガ", "キ", "ギ"], hint: "水箭龜格子裡的字加上兩點。" }
              ], bonusDialogue: "你學會了縮小版的『ッ』(促音)，知道看到它要停頓一下了！" },
            { pokemonName: "胖丁", pokemonId: 39,
              steps: [
                  { dialogue: "第九關是愛唱歌的胖丁！發音 Pu-Ri-N。第一個字「Pu」。", target: "プ", romanji: "Pu", options: ["ブ", "プ", "フ", "パ"], hint: "背著綠色種子的妙蛙種子，加上小圈圈！" },
                  { dialogue: "第二個字是「Ri」。", target: "リ", romanji: "Ri", options: ["リ", "ソ", "ン", "ツ"], hint: "噴火龍格子裡的那個字！" },
                  { dialogue: "最後一個又是鼻音「N」！", target: "ン", romanji: "N", options: ["ソ", "シ", "ン", "ツ"], hint: "卡比獸的格子！" }
              ], bonusDialogue: "輕鬆過關！準備迎接最後一關了！" },
            { pokemonName: "百變怪", pokemonId: 132,
              steps: [
                  { dialogue: "最後一關！百變怪！發音 Me-Ta-Mo-N。第一個字「Me」！", target: "メ", romanji: "Me", options: ["メ", "ナ", "ヌ", "ネ"], hint: "找實體表下半部紫色的百變怪自己。" },
                  { dialogue: "第二個字是「Ta」。", target: "タ", romanji: "Ta", options: ["タ", "ク", "ケ", "コ"], hint: "右上角那一區藍色的墨海馬。" },

              ], bonusDialogue: "「どうぐ」就是道具。包包裡的傷藥跟精靈球都放在這裡面。" },
            { pokemonName: "進化", pokemonId: 133, badgeName: "指令：進化", badgeColor: "bg-fuchsia-500",
              steps: [
                  { dialogue: "最讓人興奮的時刻：進化(Shi-N-Ka)！先找「Shi」。", target: "し", romanji: "Shi", options: ["し", "つ", "て", "ひ"], hint: "長得像大鉤子，基拉祈的大字。" },
                  { dialogue: "第二個字是鼻音「N」！", target: "ん", romanji: "N", options: ["ん", "そ", "つ", "し"], hint: "卡比獸的大字。" },
                  { dialogue: "最後一個是「Ka」！", target: "か", romanji: "Ka", options: ["か", "き", "く", "け"], hint: "水箭龜的大字！" }
              ], bonusDialogue: "恭喜！這四個指令看懂，玩日文版寶可夢就沒問題了！" }
        ];

        let currentLevels = [];
        let currentLevelIndex = 0;
        let currentStepIndex = -1;
        let collectedLetters = [];
        let currentMode = '';

        const dialogueText = document.getElementById('dialogue-text');
        const modeSelection = document.getElementById('mode-selection');
        const interactiveArea = document.getElementById('interactive-area');
        const optionsGrid = document.getElementById('options-grid');
        const resultArea = document.getElementById('result-area');
        const pokemonImage = document.getElementById('pokemon-image');
        const collectedLettersContainer = document.getElementById('collected-letters');
        const nextBtn = document.getElementById('next-btn');
        const nextLevelBtn = document.getElementById('next-level-btn');
        const hintContainer = document.getElementById('hint-container');
        const hintBtn = document.getElementById('hint-btn');
        const hintTextBox = document.getElementById('hint-text-box');
        const levelIndicator = document.getElementById('level-indicator');
        const homeBtn = document.getElementById('home-btn');
        const badgeDisplay = document.getElementById('badge-display');
        const replayAudioBtn = document.getElementById('replay-audio-btn');

        function speak(text) {
            if ('speechSynthesis' in window) {
                if (text === 'ー') {
                    const utterance = new SpeechSynthesisUtterance('長音');
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                    return;
                }
                if (text === 'ッ') {
                    const utterance = new SpeechSynthesisUtterance('停頓');
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.8; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        hintBtn.addEventListener('click', () => {
            const currentLevel = currentLevels[currentLevelIndex];
            if (currentStepIndex >= 0 && currentStepIndex < currentLevel.steps.length) {
                hintTextBox.textContent = currentLevel.steps[currentStepIndex].hint;
                hintTextBox.classList.remove('hidden');
                hintTextBox.classList.add('hint-slide-down');
            }
        });

        homeBtn.addEventListener('click', () => {
            resetToHome();
        });

        function resetToHome() {
            modeSelection.classList.remove('hidden');
            optionsGrid.classList.add('hidden');
            resultArea.classList.add('hidden');
            levelIndicator.classList.add('hidden');
            homeBtn.classList.add('hidden');
            hintContainer.classList.add('hidden');
            replayAudioBtn.classList.add('hidden');
            dialogueText.textContent = "歡迎來到究極特訓！這裡有六大主題，只要全部通關，你就能看懂圖鑑上 90% 的日文了！今天想先挑戰哪個？";
        }

        function selectMode(mode) {
            currentMode = mode;
            let modeTitle = "";
            
            if (mode === 'basicName') {
                currentLevels = basicNameLevels;
                modeTitle = "基礎圖鑑解碼";
            } else if (mode === 'advName1') {
                currentLevels = advName1Levels;
                modeTitle = "進階圖鑑(上)";
            } else if (mode === 'advName2') {
                currentLevels = advName2Levels;
                modeTitle = "進階圖鑑(下)";
            } else if (mode === 'basicType') {
                currentLevels = basicTypeLevels;
                modeTitle = "基礎屬性特訓";
            } else if (mode === 'advType') {
                currentLevels = advTypeLevels;
                modeTitle = "進階屬性特訓";
            } else if (mode === 'command') {
                currentLevels = commandLevels;
                modeTitle = "對戰指令";
            }
            
            currentLevelIndex = 0;
            modeSelection.classList.add('hidden');
            levelIndicator.classList.remove('hidden');
            levelIndicator.dataset.modeTitle = modeTitle; 
            homeBtn.classList.remove('hidden');
            
            startLevel();
        }

        function startLevel() {
            currentStepIndex = -1;
            collectedLetters = [];
            collectedLettersContainer.innerHTML = '';
            
            let modeTitle = levelIndicator.dataset.modeTitle;
            levelIndicator.textContent = `${modeTitle} ${currentLevelIndex + 1}/${currentLevels.length}`;
            
            optionsGrid.classList.remove('hidden');
            resultArea.classList.remove('hidden');
            nextLevelBtn.classList.add('hidden');
            badgeDisplay.classList.add('hidden');
            replayAudioBtn.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            
            // 指令模式或屬性模式時，顯示的是對應代表寶可夢，但不用猜寶可夢名字，所以圖片直接亮著
            const isPlainHiraganaMode = ['basicType', 'advType', 'command'].includes(currentMode);
            
            // 使用 PokeAPI 抓圖片
            if(currentLevel.pokemonId) {
                pokemonImage.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentLevel.pokemonId}.png`; 
            }
            
            if (isPlainHiraganaMode) {
                pokemonImage.classList.remove('brightness-0', 'opacity-50');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100');
            } else {
                pokemonImage.classList.add('brightness-0', 'opacity-50', 'w-32', 'h-32'); 
                pokemonImage.classList.remove('w-48', 'h-48', 'brightness-100', 'opacity-100');
            }
            
            nextStep();
        }

        function nextStep() {
            currentStepIndex++;
            nextBtn.classList.add('hidden');
            optionsGrid.innerHTML = '';
            
            hintContainer.classList.remove('hidden');
            hintTextBox.classList.add('hidden');
            hintTextBox.classList.remove('hint-slide-down');
            
            const currentLevel = currentLevels[currentLevelIndex];

            if (currentStepIndex < currentLevel.steps.length) {
                const step = currentLevel.steps[currentStepIndex];
                dialogueText.innerHTML = `${step.dialogue} <button onclick="speak('${step.target}')" class="ml-2 bg-yellow-100 border border-yellow-400 text-yellow-700 text-sm px-2 py-1 rounded-full hover:bg-yellow-200">🔊 發音</button>`;
                
                const shuffledOptions = shuffleArray([...step.options]);
                
                shuffledOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'japanese-font text-5xl md:text-6xl text-slate-700 bg-white border-4 border-slate-200 rounded-2xl p-6 flex items-center justify-center card-pop hover:border-blue-400 hover:text-blue-600 transition-colors aspect-square';
                    btn.textContent = option;
                    
                    btn.addEventListener('click', () => handleOptionClick(btn, option, step.target, step.romanji));
                    optionsGrid.appendChild(btn);
                });
            } else {
                showBonus();
            }
        }

        function handleOptionClick(btn, selected, target, romanji) {
            speak(selected); 
            
            if (selected === target) {
                btn.classList.remove('border-slate-200', 'text-slate-700', 'hover:border-blue-400');
                btn.classList.add('border-green-500', 'text-green-600', 'bg-green-50', 'correct-anim');
                
                const allBtns = optionsGrid.querySelectorAll('button');
                allBtns.forEach(b => b.disabled = true);
                
                collectedLetters.push({ char: target, romaji: romanji });
                updateCollectedArea();
                
                dialogueText.textContent = `叮咚叮咚！就是這個字！`;
                hintContainer.classList.add('hidden'); 
                
                setTimeout(() => {
                    nextBtn.classList.remove('hidden');
                }, 800);

            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                setTimeout(() => {
                    btn.classList.remove('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                }, 500);
            }
        }

        function updateCollectedArea() {
            collectedLettersContainer.innerHTML = '';
            collectedLetters.forEach(item => {
                const box = document.createElement('div');
                box.className = 'bg-slate-800 text-white border-2 border-slate-600 rounded-lg p-3 text-center min-w-[3.5rem] md:min-w-[4rem] correct-anim';
                
                const isSmallChar = item.char === 'ュ' || item.char === 'ッ';
                const charClass = isSmallChar ? 'text-2xl mt-2' : 'text-3xl font-bold';
                
                box.innerHTML = `
                    <div class="japanese-font ${charClass}">${item.char}</div>
                    <div class="text-xs text-slate-300 mt-1">${item.romaji}</div>
                `;
                collectedLettersContainer.appendChild(box);
            });
        }

        function showBonus() {
            optionsGrid.classList.add('hidden');
            hintContainer.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            const isPlainHiraganaMode = ['basicType', 'advType', 'command'].includes(currentMode);
            
            if (!isPlainHiraganaMode) {
                pokemonImage.classList.remove('brightness-0', 'opacity-50', 'w-32', 'h-32');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100', 'correct-anim');
            } else {
                badgeDisplay.textContent = currentLevel.badgeName;
                badgeDisplay.className = `text-2xl md:text-3xl font-bold px-6 py-2 rounded-full mb-4 correct-anim shadow-md ${currentLevel.badgeColor}`;
                badgeDisplay.classList.remove('hidden');
            }
            
            let fullName = currentLevel.steps.map(s => s.target).join('');
            speak(fullName); 

            // 顯示再聽一次發音按鈕並綁定事件
            replayAudioBtn.classList.remove('hidden');
            replayAudioBtn.onclick = () => speak(fullName);

            dialogueText.innerHTML = currentLevel.bonusDialogue;
            
            setTimeout(() => {
                if (currentLevelIndex < currentLevels.length - 1) {
                    nextLevelBtn.classList.remove('hidden');
                } else {
                    let finalMessage = document.createElement('div');
                    finalMessage.className = "mt-6 p-4 bg-yellow-100 border-2 border-yellow-400 rounded-xl text-yellow-800 font-bold text-lg correct-anim text-center w-full max-w-sm";
                    finalMessage.innerHTML = "🏆 這個區域的特訓已經全部通關！<br><span class='text-sm font-normal mt-2 block'>點擊右上角回主畫面繼續挑戰</span>";
                    resultArea.appendChild(finalMessage);
                }
            }, 1000);
        }

        nextBtn.addEventListener('click', nextStep);
        
        nextLevelBtn.addEventListener('click', () => {
            currentLevelIndex++;
            startLevel();
        });

    </script>
</body>
</html>
    <title>寶可夢學習終端機 - 完整五十音特訓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Yusei+Magic&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .japanese-font {
            font-family: 'Yusei Magic', sans-serif;
        }
        .card-pop {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
        }
        .card-pop:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .correct-anim {
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .hint-slide-down {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-slate-700">
        
        <div class="bg-red-600 text-white p-4 flex justify-between items-center border-b-4 border-slate-700 relative">
            <h1 class="text-xl md:text-2xl font-bold tracking-wider">五十音大師訓練中心</h1>
            <div id="level-indicator" class="bg-white text-red-600 px-3 py-1 rounded-full font-bold text-sm hidden">
                準備中
            </div>
            <button id="home-btn" class="bg-white text-slate-800 px-3 py-1 rounded-full font-bold text-sm hidden hover:bg-slate-200 transition-colors">
                回主畫面
            </button>
        </div>

        <div class="p-6 bg-slate-50 border-b-2 border-slate-200">
            <div class="flex items-start gap-4">
                <div class="text-4xl">👨‍🏫</div>
                <div class="flex-1 flex flex-col gap-2">
                    <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200 relative">
                        <p id="dialogue-text" class="text-lg md:text-xl text-slate-800 leading-relaxed">
                            歡迎來到究極特訓！這裡有六大主題，只要全部通關，你就能看懂圖鑑上 90% 的日文了！今天想先挑戰哪個？
                        </p>
                    </div>
                    
                    <div id="hint-container" class="hidden">
                        <button id="hint-btn" class="text-sm bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-bold py-1.5 px-3 rounded-full border border-yellow-300 transition-colors flex items-center gap-1">
                            💡 不知道在哪裡？點我看提示
                        </button>
                        <div id="hint-text-box" class="hidden mt-2 bg-yellow-50 border border-yellow-200 text-yellow-800 p-3 rounded-xl text-sm md:text-base leading-relaxed">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="interactive-area" class="p-6 text-center min-h-[400px] flex flex-col justify-center items-center">
            
            <!-- 六大模式選單 -->
            <div id="mode-selection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full">
                <!-- 名字特訓區 -->
                <button onclick="selectMode('basicName')" class="bg-blue-500 hover:bg-blue-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-blue-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🔍</div>
                    基礎圖鑑解碼
                    <span class="text-sm font-normal text-blue-100 mt-1">10隻經典寶可夢</span>
                </button>
                <button onclick="selectMode('advName1')" class="bg-indigo-500 hover:bg-indigo-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-indigo-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">✨</div>
                    進階圖鑑解碼 (上)
                    <span class="text-sm font-normal text-indigo-100 mt-1">拉普拉斯/呆呆獸/阿柏蛇</span>
                </button>
                <button onclick="selectMode('advName2')" class="bg-violet-500 hover:bg-violet-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-violet-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🌟</div>
                    進階圖鑑解碼 (下)
                    <span class="text-sm font-normal text-violet-100 mt-1">傑尼龜/鳳王/瑪力露</span>
                </button>

                <!-- 屬性與指令區 -->
                <button onclick="selectMode('basicType')" class="bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-green-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🌱</div>
                    基礎屬性特訓
                    <span class="text-sm font-normal text-green-100 mt-1">火 / 水 / 草 / 電</span>
                </button>
                <button onclick="selectMode('advType')" class="bg-teal-500 hover:bg-teal-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-teal-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">❄️</div>
                    進階屬性特訓
                    <span class="text-sm font-normal text-teal-100 mt-1">冰蟲毒飛 / 岩地鋼惡</span>
                </button>
                <button onclick="selectMode('command')" class="bg-orange-500 hover:bg-orange-600 text-white text-lg font-bold py-5 px-3 rounded-2xl card-pop border-b-4 border-orange-700 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-2">🎮</div>
                    對戰指令中心
                    <span class="text-sm font-normal text-orange-100 mt-1">戰鬥 / 逃跑 / 道具 / 進化</span>
                </button>
            </div>
            
            <!-- 選項網格 -->
            <div id="options-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full hidden">
            </div>

            <!-- 結果展示區 -->
            <div id="result-area" class="hidden flex flex-col items-center w-full">
                <!-- 用來顯示屬性或指令的中文意思 -->
                <div id="badge-display" class="hidden text-2xl md:text-3xl font-bold text-white px-6 py-2 rounded-full mb-4 correct-anim shadow-md"></div>
                
                <img id="pokemon-image" src="" alt="圖片" class="w-48 h-48 object-contain drop-shadow-lg mb-4">
                <div class="flex flex-wrap justify-center gap-2 mb-2" id="collected-letters">
                </div>
                
                <!-- 再聽一次發音按鈕 -->
                <button id="replay-audio-btn" class="hidden mb-4 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold py-2 px-6 rounded-full border border-yellow-300 transition-colors flex items-center justify-center gap-2 shadow-sm">
                    🔊 再聽一次完整發音
                </button>

                <button id="next-btn" class="mt-2 bg-slate-700 hover:bg-slate-800 text-white text-lg font-bold py-3 px-8 rounded-full card-pop border-b-4 border-slate-900 hidden">
                    尋找下一個字
                </button>
                <button id="next-level-btn" class="mt-2 bg-purple-500 hover:bg-purple-600 text-white text-lg font-bold py-3 px-8 rounded-full card-pop border-b-4 border-purple-700 hidden">
                    前往下一關！
                </button>
            </div>
        </div>

    </div>

    <script>
        // === 1. 基礎圖鑑解碼 (10關) ===
        const basicNameLevels = [
            { pokemonName: "路卡利歐", pokemonId: 448, 
              steps: [
                  { dialogue: "第一關！路卡利歐。請找出發音是「Ru」的字！", target: "ル", romanji: "Ru", options: ["ア", "ル", "サ", "メ"], hint: "左邊數來第二行，神獸洛奇亞格子右下角的字。" },
                  { dialogue: "太厲害了！接下來第二個字發音是「Ka」，找找看！", target: "カ", romanji: "Ka", options: ["ナ", "オ", "カ", "キ"], hint: "第一排右邊數來第二個，水箭龜格子右下角。" },
                  { dialogue: "找到了！第三個字發音是「Ri」，交給你了！", target: "リ", romanji: "Ri", options: ["リ", "ソ", "ン", "ツ"], hint: "左邊數來第二行，噴火龍格子右下角。" },
                  { dialogue: "路卡利歐的最後一個字！發音是「O」！", target: "オ", romanji: "O", options: ["木", "オ", "ネ", "ホ"], hint: "看實體表的最右下角，火爆猴旁邊的字！" }
              ], bonusDialogue: "太強了！你成功拼出了「ルカリオ」。" },
            { pokemonName: "卡比獸", pokemonId: 143, 
              steps: [
                  { dialogue: "第二關是愛睡覺的卡比獸！發音是 Ka-Bi-Go-N。第一個字是學過的「Ka」。", target: "カ", romanji: "Ka", options: ["カ", "ウ", "ミ", "ラ"], hint: "再看一次第一排的「水箭龜」喔！" },
                  { dialogue: "第二個字是「Bi」。在「Hi」這個字的右上角加上兩點就是了。", target: "ビ", romanji: "Bi", options: ["ピ", "ビ", "ヒ", "ニ"], hint: "找小火龍(第二排中間)，把牠旁邊的字加上兩點。" },
                  { dialogue: "第三個字是「Go」。找到「Ko」加上兩點！", target: "ゴ", romanji: "Go", options: ["コ", "ド", "ゴ", "ボ"], hint: "最下面那一排可達鴨，把字加上兩點！" },
                  { dialogue: "最後是閉著嘴巴發出的鼻音「N」！", target: "ン", romanji: "N", options: ["ソ", "シ", "ン", "ツ"], hint: "整張表最左上角，卡比獸自己的格子裡！" }
              ], bonusDialogue: "漂亮！你成功收服了卡比獸！也學會了加兩點的濁音。" },
            { pokemonName: "皮卡丘", pokemonId: 25, 
              steps: [

                  { dialogue: "第二個字是 O。", target: "お", romanji: "O", options: ["あ", "お", "む", "を"], hint: "最右下角火爆猴的大字。" },
                  { dialogue: "最後一個字是 Ri，長得像兩根棍子。", target: "り", romanji: "Ri", options: ["り", "い", "に", "ち"], hint: "左邊數來第二行噴火龍大大的黑字。" }
              ], bonusDialogue: "解鎖冰屬性「こおり」！" },
            { pokemonName: "綠毛蟲", pokemonId: 10, badgeName: "蟲屬性", badgeColor: "bg-lime-500 text-slate-800",
              steps: [
                  { dialogue: "蟲屬性(Mu-Shi)！先找 Mu。", target: "む", romanji: "Mu", options: ["す", "む", "め", "も"], hint: "第三排夢妖的大字。" },
                  { dialogue: "第二個字是 Shi，長得像大大的鉤子。", target: "し", romanji: "Shi", options: ["し", "つ", "て", "ひ"], hint: "第二排右邊數來第三個基拉祈的大黑字。" }
              ], bonusDialogue: "解鎖蟲屬性「むし」！" },
            { pokemonName: "阿柏蛇", pokemonId: 23, badgeName: "毒屬性", badgeColor: "bg-purple-600",
              steps: [
                  { dialogue: "毒屬性(Do-Ku)！第一個字是 Do，To 加上兩點的濁音。", target: "ど", romanji: "Do", options: ["と", "ど", "で", "て"], hint: "下半部中間波克比大字加上兩點。" },
                  { dialogue: "第二個字是 Ku，長得像小於符號 <。", target: "く", romanji: "Ku", options: ["く", "へ", "て", "し"], hint: "右邊數來第二行臭臭花裡的大字。" }
              ], bonusDialogue: "解鎖毒屬性「どく」！" },
            { pokemonName: "比雕", pokemonId: 18, badgeName: "飛行屬性", badgeColor: "bg-sky-300 text-slate-800",
              steps: [
                  { dialogue: "飛行屬性(Hi-Ko-U)！先找第一個字 Hi。", target: "ひ", romanji: "Hi", options: ["ひ", "い", "に", "き"], hint: "第二排中間小火龍的大黑字！" },
                  { dialogue: "第二個字是 Ko。", target: "こ", romanji: "Ko", options: ["こ", "い", "に", "た"], hint: "最下面一排黃色的可達鴨。" },
                  { dialogue: "最後一個字是 U。", target: "う", romanji: "U", options: ["う", "つ", "て", "ろ"], hint: "右邊數來第三排最上面的風速狗大字！" }
              ], bonusDialogue: "解鎖飛行屬性「ひこう」！" },
            { pokemonName: "小拳石", pokemonId: 74, badgeName: "岩石屬性", badgeColor: "bg-stone-500",
              steps: [
                  { dialogue: "岩石屬性發音是 I-Wa。先找「I」。", target: "い", romanji: "I", options: ["い", "り", "こ", "た"], hint: "看實體表最右上角，火稚雞格子裡大大的黑字。" },
                  { dialogue: "第二個字是「Wa」。", target: "わ", romanji: "Wa", options: ["ね", "れ", "わ", "を"], hint: "看最左邊那一列拉普拉斯旁邊，看大大的黑字。" }
              ], bonusDialogue: "解鎖岩石屬性「いわ」！這個字在日文就是石頭的意思。" },
            { pokemonName: "穿山鼠", pokemonId: 27, badgeName: "地面屬性", badgeColor: "bg-amber-700",
              steps: [
                  { dialogue: "地面屬性是 Ji-Me-N。先找「Ji」。這是 Shi 加上兩點喔！", target: "じ", romanji: "Ji", options: ["し", "じ", "ち", "ぢ"], hint: "找第二排右邊數來第三個白色的基拉祈，把大字加上兩點。" },
                  { dialogue: "第二個字是「Me」。", target: "め", romanji: "Me", options: ["ぬ", "め", "の", "あ"], hint: "實體表下半部，紫色的百變怪，看牠的大字！" },
                  { dialogue: "最後是鼻音「N」。", target: "ん", romanji: "N", options: ["ん", "そ", "つ", "し"], hint: "老朋友卡比獸格子裡的大字。" }
              ], bonusDialogue: "解鎖地面屬性「じめん」！" },
            { pokemonName: "盔甲鳥", pokemonId: 227, badgeName: "鋼屬性", badgeColor: "bg-slate-400",
              steps: [
                  { dialogue: "鋼屬性是 Ha-Ga-Ne。先找「Ha」。", target: "は", romanji: "Ha", options: ["は", "ほ", "け", "に"], hint: "右邊數來第五行，藍色的迷你龍，看大字。" },
                  { dialogue: "第二個是「Ga」，Ka 加上兩點！", target: "が", romanji: "Ga", options: ["か", "が", "き", "ぎ"], hint: "第一排的水箭龜，大字加兩點。" },
                  { dialogue: "第三個字是「Ne」。", target: "ね", romanji: "Ne", options: ["ぬ", "ね", "わ", "れ"], hint: "找抱著木頭的樹枕尾熊，看牠的大字。" }
              ], bonusDialogue: "解鎖鋼屬性「はがね」！" },
            { pokemonName: "月亮伊布", pokemonId: 197, badgeName: "惡屬性", badgeColor: "bg-gray-800",
              steps: [
                  { dialogue: "惡屬性只有兩個字 A-Ku。先找「A」。", target: "あ", romanji: "A", options: ["お", "あ", "め", "ぬ"], hint: "實體表最右上角第一格！火稚雞的大字。" },
                  { dialogue: "第二個字是「Ku」。長得像小於 < 。", target: "く", romanji: "Ku", options: ["く", "へ", "て", "し"], hint: "右邊數來第二行臭臭花裡的大字。" }
              ], bonusDialogue: "解鎖惡屬性「あく」！進階屬性全部通關啦！" }
        ];

        // === 6. 對戰指令中心 (4關) ===
        const commandLevels = [
            { pokemonName: "戰鬥", pokemonId: 68, badgeName: "指令：戰鬥", badgeColor: "bg-red-600",
              steps: [
                  { dialogue: "玩遊戲遇到野生寶可夢，要選戰鬥(Ta-Ta-Ka-U)！先找「Ta」。", target: "た", romanji: "Ta", options: ["た", "な", "に", "こ"], hint: "右上角藍色的墨海馬格子裡的大字。" },
                  { dialogue: "第二個字也是「Ta」喔！", target: "た", romanji: "Ta", options: ["た", "ち", "て", "と"], hint: "跟剛才一模一樣！" },
                  { dialogue: "第三個字是「Ka」。", target: "か", romanji: "Ka", options: ["か", "き", "く", "け"], hint: "水箭龜大大的字。" },
                  { dialogue: "最後是「U」。", target: "う", romanji: "U", options: ["う", "つ", "て", "ろ"], hint: "右上角風速狗的大字。" }
              ], bonusDialogue: "學會了！以後玩日文版遊戲，看到「たたかう」就知道是攻擊按鈕啦！" },
            { pokemonName: "逃跑", pokemonId: 63, badgeName: "指令：逃跑", badgeColor: "bg-blue-400",
              steps: [
                  { dialogue: "打不贏怎麼辦？要選逃跑(Ni-Ge-Ru)！先找「Ni」。", target: "に", romanji: "Ni", options: ["に", "は", "い", "た"], hint: "第二排中間偏右，喵喵格子裡的大字。" },
                  { dialogue: "第二個字是「Ge」。Ke 加兩點！", target: "げ", romanji: "Ge", options: ["け", "げ", "く", "ぐ"], hint: "耿鬼大字加兩點。" },
                  { dialogue: "最後是「Ru」。", target: "る", romanji: "Ru", options: ["る", "ろ", "わ", "を"], hint: "左邊數來第二行上面的洛奇亞，看大字。" }
              ], bonusDialogue: "三十六計走為上策！「にげる」就是逃跑的意思。" },
            { pokemonName: "道具", pokemonId: 100, badgeName: "指令：道具", badgeColor: "bg-yellow-500 text-slate-800",
              steps: [
                  { dialogue: "想丟精靈球要選道具(Do-U-Gu)！先找「Do」，To 加兩點。", target: "ど", romanji: "Do", options: ["と", "ど", "で", "て"], hint: "波克比大字加兩點。" },
                  { dialogue: "第二個字是「U」。", target: "う", romanji: "U", options: ["う", "つ", "て", "ろ"], hint: "風速狗的大字。" },
                  { dialogue: "第三個是「Gu」，Ku 加兩點喔！", target: "ぐ", romanji: "Gu", options: ["く", "ぐ", "け", "げ"], hint: "臭臭花的大字加兩點。" }
              ], bonusDialogue: "「どうぐ」就是道具。包包裡的傷藥跟精靈球都放在這裡面。" },
            { pokemonName: "進化", pokemonId: 133, badgeName: "指令：進化", badgeColor: "bg-fuchsia-500",
              steps: [
                  { dialogue: "最讓人興奮的時刻：進化(Shi-N-Ka)！先找「Shi」。", target: "し", romanji: "Shi", options: ["し", "つ", "て", "ひ"], hint: "長得像大鉤子，基拉祈的大字。" },
                  { dialogue: "第二個字是鼻音「N」！", target: "ん", romanji: "N", options: ["ん", "そ", "つ", "し"], hint: "卡比獸的大字。" },
                  { dialogue: "最後一個是「Ka」！", target: "か", romanji: "Ka", options: ["か", "き", "く", "け"], hint: "水箭龜的大字！" }
              ], bonusDialogue: "恭喜！這四個指令看懂，玩日文版寶可夢就沒問題了！" }
        ];

        let currentLevels = [];
        let currentLevelIndex = 0;
        let currentStepIndex = -1;
        let collectedLetters = [];
        let currentMode = '';

        const dialogueText = document.getElementById('dialogue-text');
        const modeSelection = document.getElementById('mode-selection');
        const interactiveArea = document.getElementById('interactive-area');
        const optionsGrid = document.getElementById('options-grid');
        const resultArea = document.getElementById('result-area');
        const pokemonImage = document.getElementById('pokemon-image');
        const collectedLettersContainer = document.getElementById('collected-letters');
        const nextBtn = document.getElementById('next-btn');
        const nextLevelBtn = document.getElementById('next-level-btn');
        const hintContainer = document.getElementById('hint-container');
        const hintBtn = document.getElementById('hint-btn');
        const hintTextBox = document.getElementById('hint-text-box');
        const levelIndicator = document.getElementById('level-indicator');
        const homeBtn = document.getElementById('home-btn');
        const badgeDisplay = document.getElementById('badge-display');
        const replayAudioBtn = document.getElementById('replay-audio-btn');

        function speak(text) {
            if ('speechSynthesis' in window) {
                if (text === 'ー') {
                    const utterance = new SpeechSynthesisUtterance('長音');
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                    return;
                }
                if (text === 'ッ') {
                    const utterance = new SpeechSynthesisUtterance('停頓');
                    utterance.lang = 'zh-TW';
                    window.speechSynthesis.speak(utterance);
                    return;
                }
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.8; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        hintBtn.addEventListener('click', () => {
            const currentLevel = currentLevels[currentLevelIndex];
            if (currentStepIndex >= 0 && currentStepIndex < currentLevel.steps.length) {
                hintTextBox.textContent = currentLevel.steps[currentStepIndex].hint;
                hintTextBox.classList.remove('hidden');
                hintTextBox.classList.add('hint-slide-down');
            }
        });

        homeBtn.addEventListener('click', () => {
            resetToHome();
        });

        function resetToHome() {
            modeSelection.classList.remove('hidden');
            optionsGrid.classList.add('hidden');
            resultArea.classList.add('hidden');
            levelIndicator.classList.add('hidden');
            homeBtn.classList.add('hidden');
            hintContainer.classList.add('hidden');
            replayAudioBtn.classList.add('hidden');
            dialogueText.textContent = "歡迎來到究極特訓！這裡有六大主題，只要全部通關，你就能看懂圖鑑上 90% 的日文了！今天想先挑戰哪個？";
        }

        function selectMode(mode) {
            currentMode = mode;
            let modeTitle = "";
            
            if (mode === 'basicName') {
                currentLevels = basicNameLevels;
                modeTitle = "基礎圖鑑解碼";
            } else if (mode === 'advName1') {
                currentLevels = advName1Levels;
                modeTitle = "進階圖鑑(上)";
            } else if (mode === 'advName2') {
                currentLevels = advName2Levels;
                modeTitle = "進階圖鑑(下)";
            } else if (mode === 'basicType') {
                currentLevels = basicTypeLevels;
                modeTitle = "基礎屬性特訓";
            } else if (mode === 'advType') {
                currentLevels = advTypeLevels;
                modeTitle = "進階屬性特訓";
            } else if (mode === 'command') {
                currentLevels = commandLevels;
                modeTitle = "對戰指令";
            }
            
            currentLevelIndex = 0;
            modeSelection.classList.add('hidden');
            levelIndicator.classList.remove('hidden');
            levelIndicator.dataset.modeTitle = modeTitle; 
            homeBtn.classList.remove('hidden');
            
            startLevel();
        }

        function startLevel() {
            currentStepIndex = -1;
            collectedLetters = [];
            collectedLettersContainer.innerHTML = '';
            
            let modeTitle = levelIndicator.dataset.modeTitle;
            levelIndicator.textContent = `${modeTitle} ${currentLevelIndex + 1}/${currentLevels.length}`;
            
            optionsGrid.classList.remove('hidden');
            resultArea.classList.remove('hidden');
            nextLevelBtn.classList.add('hidden');
            badgeDisplay.classList.add('hidden');
            replayAudioBtn.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            
            // 指令模式或屬性模式時，顯示的是對應代表寶可夢，但不用猜寶可夢名字，所以圖片直接亮著
            const isPlainHiraganaMode = ['basicType', 'advType', 'command'].includes(currentMode);
            
            // 使用 PokeAPI 抓圖片
            if(currentLevel.pokemonId) {
                pokemonImage.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${currentLevel.pokemonId}.png`; 
            }
            
            if (isPlainHiraganaMode) {
                pokemonImage.classList.remove('brightness-0', 'opacity-50');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100');
            } else {
                pokemonImage.classList.add('brightness-0', 'opacity-50', 'w-32', 'h-32'); 
                pokemonImage.classList.remove('w-48', 'h-48', 'brightness-100', 'opacity-100');
            }
            
            nextStep();
        }

        function nextStep() {
            currentStepIndex++;
            nextBtn.classList.add('hidden');
            optionsGrid.innerHTML = '';
            
            hintContainer.classList.remove('hidden');
            hintTextBox.classList.add('hidden');
            hintTextBox.classList.remove('hint-slide-down');
            
            const currentLevel = currentLevels[currentLevelIndex];

            if (currentStepIndex < currentLevel.steps.length) {
                const step = currentLevel.steps[currentStepIndex];
                dialogueText.innerHTML = `${step.dialogue} <button onclick="speak('${step.target}')" class="ml-2 bg-yellow-100 border border-yellow-400 text-yellow-700 text-sm px-2 py-1 rounded-full hover:bg-yellow-200">🔊 發音</button>`;
                
                const shuffledOptions = shuffleArray([...step.options]);
                
                shuffledOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'japanese-font text-5xl md:text-6xl text-slate-700 bg-white border-4 border-slate-200 rounded-2xl p-6 flex items-center justify-center card-pop hover:border-blue-400 hover:text-blue-600 transition-colors aspect-square';
                    btn.textContent = option;
                    
                    btn.addEventListener('click', () => handleOptionClick(btn, option, step.target, step.romanji));
                    optionsGrid.appendChild(btn);
                });
            } else {
                showBonus();
            }
        }

        function handleOptionClick(btn, selected, target, romanji) {
            speak(selected); 
            
            if (selected === target) {
                btn.classList.remove('border-slate-200', 'text-slate-700', 'hover:border-blue-400');
                btn.classList.add('border-green-500', 'text-green-600', 'bg-green-50', 'correct-anim');
                
                const allBtns = optionsGrid.querySelectorAll('button');
                allBtns.forEach(b => b.disabled = true);
                
                collectedLetters.push({ char: target, romaji: romanji });
                updateCollectedArea();
                
                dialogueText.textContent = `叮咚叮咚！就是這個字！`;
                hintContainer.classList.add('hidden'); 
                
                setTimeout(() => {
                    nextBtn.classList.remove('hidden');
                }, 800);

            } else {
                btn.classList.add('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                setTimeout(() => {
                    btn.classList.remove('shake', 'bg-red-50', 'border-red-300', 'text-red-500');
                }, 500);
            }
        }

        function updateCollectedArea() {
            collectedLettersContainer.innerHTML = '';
            collectedLetters.forEach(item => {
                const box = document.createElement('div');
                box.className = 'bg-slate-800 text-white border-2 border-slate-600 rounded-lg p-3 text-center min-w-[3.5rem] md:min-w-[4rem] correct-anim';
                
                const isSmallChar = item.char === 'ュ' || item.char === 'ッ';
                const charClass = isSmallChar ? 'text-2xl mt-2' : 'text-3xl font-bold';
                
                box.innerHTML = `
                    <div class="japanese-font ${charClass}">${item.char}</div>
                    <div class="text-xs text-slate-300 mt-1">${item.romaji}</div>
                `;
                collectedLettersContainer.appendChild(box);
            });
        }

        function showBonus() {
            optionsGrid.classList.add('hidden');
            hintContainer.classList.add('hidden');
            
            const currentLevel = currentLevels[currentLevelIndex];
            const isPlainHiraganaMode = ['basicType', 'advType', 'command'].includes(currentMode);
            
            if (!isPlainHiraganaMode) {
                pokemonImage.classList.remove('brightness-0', 'opacity-50', 'w-32', 'h-32');
                pokemonImage.classList.add('w-48', 'h-48', 'brightness-100', 'opacity-100', 'correct-anim');
            } else {
                badgeDisplay.textContent = currentLevel.badgeName;
                badgeDisplay.className = `text-2xl md:text-3xl font-bold px-6 py-2 rounded-full mb-4 correct-anim shadow-md ${currentLevel.badgeColor}`;
                badgeDisplay.classList.remove('hidden');
            }
            
            let fullName = currentLevel.steps.map(s => s.target).join('');
            speak(fullName); 

            // 顯示再聽一次發音按鈕並綁定事件
            replayAudioBtn.classList.remove('hidden');
            replayAudioBtn.onclick = () => speak(fullName);

            dialogueText.innerHTML = currentLevel.bonusDialogue;
            
            setTimeout(() => {
                if (currentLevelIndex < currentLevels.length - 1) {
                    nextLevelBtn.classList.remove('hidden');
                } else {
                    let finalMessage = document.createElement('div');
                    finalMessage.className = "mt-6 p-4 bg-yellow-100 border-2 border-yellow-400 rounded-xl text-yellow-800 font-bold text-lg correct-anim text-center w-full max-w-sm";
                    finalMessage.innerHTML = "🏆 這個區域的特訓已經全部通關！<br><span class='text-sm font-normal mt-2 block'>點擊右上角回主畫面繼續挑戰</span>";
                    resultArea.appendChild(finalMessage);
                }
            }, 1000);
        }

        nextBtn.addEventListener('click', nextStep);
        
        nextLevelBtn.addEventListener('click', () => {
            currentLevelIndex++;
            startLevel();
        });

    </script>
</body>
</html>
